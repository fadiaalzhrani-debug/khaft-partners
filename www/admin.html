<style>
  :root{ --gold:#F5C518; --gold-strong:#E7B70B; --gold-deep:#B8860B; --gold-soft:#FBF1C9; --gold-tint:#FDF8E7;
    --ink:#1A1712; --brand-dark:#000; --bg:#FAF7EF; --card:#fff; --muted:#6E685B; --line:#EBE5D6;
    --ok:#15803D; --ok-soft:#DCFCE7; --danger:#DC2626; --danger-soft:#FBE4E4;
    --r:18px; --shadow:0 1px 2px rgba(40,32,10,.04),0 10px 28px rgba(40,32,10,.06); --shadow-sm:0 1px 2px rgba(40,32,10,.04),0 4px 12px rgba(40,32,10,.045); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Cairo','Segoe UI',Tahoma,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-tap-highlight-color:transparent}
  .wrap{max-width:960px;margin:0 auto;padding:0 18px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit;font-size:1rem}
  a{color:inherit;text-decoration:none}
  header.top{position:sticky;top:0;z-index:30;background:rgba(250,247,239,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top)}
  .top .wrap{display:flex;align-items:center;gap:12px;height:64px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:1.2rem}
  .brand .mk{width:38px;height:38px;border-radius:11px;background:var(--gold);color:var(--ink);display:grid;place-items:center;font-size:1.1rem}
  .spacer{flex:1}
  .logout{color:var(--muted);font-weight:700;font-size:.85rem;padding:6px 10px}

  .login{max-width:380px;margin:44px auto;padding:0 18px;text-align:center}
  .login .ic{font-size:3rem;margin-bottom:8px}
  .login h1{font-size:1.5rem;font-weight:900}
  .login p{color:var(--muted);margin:6px 0 20px;font-size:.9rem}
  .login input{width:100%;padding:15px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);font-weight:700;font-size:1.05rem;margin-bottom:12px}
  .login input:focus{outline:none;border-color:var(--gold-strong)}
  .login .btn{width:100%;background:var(--ink);color:#fff;font-weight:900;padding:16px;border-radius:13px;font-size:1.05rem}
  .login .lgerr{background:var(--danger-soft);color:#991B1B;border-radius:12px;padding:12px;margin-top:12px;font-weight:600;font-size:.9rem}

  .screen{padding:18px 0 40px}
  .admin-bar{background:var(--ink);color:#fff;border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;gap:13px}
  .admin-bar .ico{font-size:1.7rem;color:var(--gold)}
  .admin-bar b{font-size:1.15rem}
  .admin-bar small{opacity:.7;display:block}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--shadow-sm)}
  .stat .n{font-size:1.6rem;font-weight:900;line-height:1}
  .stat .l{color:var(--muted);font-size:.85rem;margin-top:6px}
  .stat.gold .n{color:var(--gold-strong)} .stat.green .n{color:var(--ok)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px;margin-top:18px}
  .panel h3{font-size:1.05rem;font-weight:800;margin-bottom:12px}
  /* رأس قابل للطي — اضغط عليه لتصغير/فتح اللوحة */
  .panel h3.ph{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;user-select:none;
    margin-bottom:0;padding:2px 0;transition:color .15s}
  .panel h3.ph:hover{color:var(--gold-deep)}
  .panel h3.ph.open{margin-bottom:12px}
  .panel h3.ph .chev{font-size:.85rem;color:var(--muted);background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:3px 9px;font-weight:900;flex-shrink:0}
  .panel h3.ph:hover .chev{border-color:var(--gold)}
  .rline{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .rline:last-child{border-bottom:none}
  .rl-t{flex:1} .rl-t small{color:var(--muted);display:block;font-size:.8rem}
  .prov-card{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:#fcfbf6}
  .prov-card .pc-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .prov-card b{font-size:1.02rem}
  .status{font-size:.76rem;font-weight:800;padding:5px 12px;border-radius:999px;white-space:nowrap}
  .st-new{background:var(--gold-soft);color:#7a5f00} .st-confirmed{background:#E0F2FE;color:#075985}
  .st-progress{background:#FEF0C7;color:#92600A} .st-done{background:var(--ok-soft);color:#166534} .st-cancelled{background:var(--danger-soft);color:#991B1B}
  /* وصل الفني — يظهر جنب الحالة */
  .st-arrived{background:rgba(37,211,102,.2);color:#0b7a3b;animation:arrBlink 1.8s ease-in-out infinite}
  @keyframes arrBlink{0%,100%{opacity:1}50%{opacity:.6}}
  .st-delay{background:#FEF0C7;color:#92600A}
  /* شريط مراحل الطلب */
  .flow{display:flex;align-items:center;gap:5px;margin:10px 0 2px;flex-wrap:wrap}
  .flow i{font-style:normal;font-size:.72rem;font-weight:800;padding:4px 9px;border-radius:20px;
    background:var(--bg);color:var(--muted);border:1px solid var(--line);white-space:nowrap}
  .flow i.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .flow i.arr{background:#0b7a3b;color:#fff;border-color:#0b7a3b}
  .flow span{color:var(--line);font-weight:900;font-size:.7rem}
  .mini-ok{color:#0b7a3b;font-weight:800;font-size:.82rem;align-self:center;margin-inline-end:6px}
  .fbar{display:flex;gap:8px;overflow-x:auto;margin-top:16px;padding-bottom:4px;scrollbar-width:none}
  .fbar::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;padding:9px 16px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-weight:700;color:var(--muted);font-size:.9rem}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .aorder{background:var(--card);border:1px solid var(--line);border-right:5px solid var(--gold);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:17px;margin-top:12px}
  .aorder.st-confirmed{border-right-color:#0284C7} .aorder.st-progress{border-right-color:var(--gold-strong)}
  .aorder.st-done{border-right-color:var(--ok)} .aorder.st-cancelled{border-right-color:var(--danger)}
  .aorder .ah{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
  .aorder .who b{font-size:1.05rem}
  .aorder .who a{color:var(--ink);font-weight:800;border-bottom:2px solid var(--gold)}
  .aorder .abody{display:grid;grid-template-columns:1fr 1fr;gap:9px 18px;margin-top:13px;font-size:.9rem}
  .aorder .abody .k{color:var(--muted);font-size:.8rem}
  .aorder .aitems{background:#faf8f1;border-radius:12px;padding:11px 13px;margin-top:13px;font-size:.88rem}
  .aorder .aitems .li{display:flex;justify-content:space-between;padding:3px 0}
  .aorder .actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
  .sbtn{padding:10px 15px;border-radius:11px;font-weight:700;font-size:.86rem;border:1.5px solid var(--line);background:#fff;transition:.15s}
  .sbtn:hover{background:#f6f4ec} .sbtn.danger{color:var(--danger);border-color:#f0cccc} .sbtn.ok{color:#fff;background:var(--ok);border-color:var(--ok)}
  .plang-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .plang{padding:8px 14px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:800;font-size:.85rem;color:var(--muted);cursor:pointer;font-family:inherit}
  .plang.active{background:var(--gold,#F5C518);border-color:var(--gold,#F5C518);color:var(--ink)}
  .pr-cat{margin-top:14px} .pr-cat h4{font-size:.98rem;font-weight:900;color:var(--ink);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .pr-edit-row{display:flex;align-items:center;gap:10px;padding:7px 0}
  .pr-edit-row span{flex:1;font-weight:600;font-size:.92rem}
  .pr-edit-row input{width:90px;padding:9px 11px;border-radius:9px;border:1.5px solid var(--line);background:#fff;font-weight:800;text-align:center;font-size:1rem;color:var(--ink);font-family:inherit}
  .pr-edit-row input:focus{outline:none;border-color:var(--gold-strong,#E3AF07)}
  .pr-edit-row b{color:var(--muted);font-weight:700;font-size:.82rem;width:30px}
  .rev-ctl{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .inv-add-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .inv-add-row input{padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-family:inherit;font-weight:700;font-size:.9rem;flex:1;min-width:110px}
  .inv-add-row input#inv_new_unit{max-width:80px;flex:0 0 auto}
  .inv-add-row input#inv_new_qty{max-width:90px;flex:0 0 auto}
  .inv-list{margin-top:14px;display:grid;gap:10px}
  .inv-item{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fff}
  .inv-item.low{border-color:#f0b0b0;background:#fdf5f5}
  .inv-item.mismatch{border-color:#e0a800;background:#fffbe6}
  .inv-recon{margin-top:6px;font-size:.82rem;color:var(--muted);font-weight:600}
  .inv-recon b{color:var(--ink)}
  .recon-warn{color:#c0392b;font-weight:800}
  .recon-ok{color:#0b7a3b;font-weight:800}
  .inv-info{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .inv-info b{font-size:1.02rem}
  .inv-qty{font-weight:800;color:var(--muted);font-size:.9rem}
  .inv-item.low .inv-qty{color:var(--danger)}
  .inv-ctl{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .inv-ctl .inv-amt{width:80px;padding:9px 10px;border-radius:9px;border:1.5px solid var(--line);background:#fcfbf6;font-weight:800;text-align:center;font-family:inherit}
  .log-day{margin-bottom:14px}
  .log-day-h{font-weight:900;color:var(--ink);border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:6px}
  .log-day-h small{color:var(--muted);font-weight:700}
  .log-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.86rem;flex-wrap:wrap}
  .log-t{color:var(--muted);font-weight:700;min-width:64px}
  .log-d{font-weight:900;min-width:52px}
  .log-d.add{color:#0b7a3b} .log-d.sub{color:var(--danger)}
  .log-n{font-weight:800;flex:1}
  .log-a{color:var(--muted);font-weight:600;font-size:.8rem}
  .sec-head h2{font-size:1.25rem;font-weight:900;margin-top:20px}
  /* رأس اليوم — يفصل الطلبات حسب التاريخ ويلتصق فوق عند التمرير */
  .day-head{position:sticky;top:64px;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-weight:900;font-size:1.02rem;color:var(--ink);background:var(--gold);
    border-radius:12px;padding:11px 16px;margin:22px 2px 12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .day-head .cnt{font-size:.82rem;font-weight:800;background:rgba(0,0,0,.14);padding:3px 10px;border-radius:20px}
  .day-head.today{background:var(--ink);color:#fff}
  .day-head.today .cnt{background:rgba(255,255,255,.2)}
  .day-head.past{background:#e8e5dd;color:var(--muted)}
  /* شريط الأيام — نظرة سريعة على الشهر وفلترة بضغطة */
  .calbar{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:14px;margin-top:16px}
  .cal-head{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:11px;font-weight:900;font-size:1.05rem}
  .cal-nav{background:var(--bg);border:1px solid var(--line);color:var(--ink);width:34px;height:34px;border-radius:10px;
    font-size:1.25rem;font-weight:900;cursor:pointer;line-height:1;font-family:inherit}
  .cal-nav:hover{border-color:var(--gold);background:var(--gold)}
  /* شريط تمرير ظاهر — يبيّن إن فيه أيام أكثر تحت السحب */
  .cal-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;
    scrollbar-width:thin;scrollbar-color:var(--gold) rgba(0,0,0,.06)}
  .cal-strip::-webkit-scrollbar{height:9px}
  .cal-strip::-webkit-scrollbar-track{background:rgba(0,0,0,.06);border-radius:10px}
  .cal-strip::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px;border:2px solid var(--card)}
  .cal-strip::-webkit-scrollbar-thumb:hover{background:var(--gold-deep)}
  .cal-day{flex:0 0 auto;width:64px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 6px;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:.12s;color:var(--muted);font-family:inherit}
  .cal-day:hover{border-color:var(--gold)}
  .cal-day .cd-w{font-size:.68rem;font-weight:700}
  .cal-day .cd-n{font-size:1.18rem;font-weight:900;color:var(--ink);line-height:1}
  .cal-day .cd-c{font-size:.72rem;font-weight:800;color:var(--muted);white-space:nowrap}
  .cal-day.has{background:rgba(245,197,24,.16);border-color:rgba(245,197,24,.55)}
  .cal-day.has .cd-c{color:var(--gold-deep)}
  .cal-day.today{border-color:var(--ink);border-width:2px}
  .cal-day.sel{background:var(--gold);border-color:var(--gold)}
  .cal-day.sel .cd-c,.cal-day.sel .cd-w{color:var(--ink)}
  .cal-filter{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px;padding-top:11px;
    border-top:1px solid var(--line);font-weight:900}
  .cal-filter button{background:var(--ink);color:#fff;border:none;border-radius:9px;padding:7px 14px;font-weight:800;
    cursor:pointer;font-family:inherit;font-size:.85rem}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty .ico{font-size:3rem;margin-bottom:10px;opacity:.5}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--ink);color:#fff;padding:14px 24px;border-radius:14px;font-weight:700;z-index:60;opacity:0;transition:.3s;box-shadow:var(--shadow);max-width:90%;text-align:center;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (max-width:760px){ .stats{grid-template-columns:repeat(2,1fr)} .aorder .abody{grid-template-columns:1fr} }
</style>
</head>

let PRICES={};
function svcPrice(s){ return (PRICES[s.id]!=null)?PRICES[s.id]:s.price; }
function renderPriceEditor(){
  const sw=priceLangs.map(([l,n])=>`<button class="plang ${priceLang===l?'active':''}" onclick="setPriceLang('${l}')">${n}</button>`).join('');
  const groups=Object.keys(CAT_I18N).map(k=>{
    const rows=SERVICES.filter(s=>s.cat===k).map(s=>`<div class="pr-edit-row"><span>${esc(psvcName(s))}</span><input type="number" inputmode="numeric" min="0" id="pr_${s.id}" value="${svcPrice(s)}" /><b>ر.س</b></div>`).join('');

async function savePrices(){
  const rows=SERVICES.map(s=>{ const el=document.getElementById('pr_'+s.id); const v=el?Math.max(0,Math.round(+el.value||0)):svcPrice(s); return {sid:s.id,price:v}; });
  rows.forEach(r=>{ PRICES[r.sid]=r.price; });
  if(!cloudReady){ toast('لا يوجد اتصال بالخادم'); return; }
  try{ const {error}=await sb.from('khafet_prices').upsert(rows); if(error) throw error; toast('💾 تم حفظ الأسعار — انطبقت على كل الصفحات'); }
  catch(e){ toast('تعذّر الحفظ — تأكد من تشغيل جدول khafet_prices'); }
  render();
}

let sb=null, cloudReady=false;
/* ---------- وسائط العملاء ----------
   الباكِت خاص — رابط موقّع ينتهي بعد ١٠ دقائق عند كل فتح. */
function mediaPath(v){
  if(!v) return '';
  const s=String(v);
  const m=s.match(/khafet-videos\/(.+?)(\?|$)/);
  return m ? decodeURIComponent(m[1]) : s;
}
async function openMedia(v){
  const p=mediaPath(v);
  if(!p || !sb) return;
  try{
    const { data, error } = await sb.storage.from('khafet-videos').createSignedUrl(p, 600);
    if(error || !data) throw error || new Error('no url');
    window.open(data.signedUrl, '_blank', 'noopener');
  }catch(e){ console.warn('media:', e.message||e); toast('تعذّر فتح الملف'); }
}
/* هل المستخدم الحالي أدمن؟ (يسأل قاعدة البيانات — لا يعتمد على المتصفح) */
async function isAdminUser(){ try{ const { data }=await sb.rpc('staff_role'); return data==='admin'; }catch(e){ return false; } }
async function initCloud(){
  try{
    if(window.supabase && SUPABASE_URL){
      sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON); cloudReady=true;
      const { data:{ session } }=await sb.auth.getSession();
      if(session){
        if(await isAdminUser()){ loggedIn=true; loadAll(); subscribe(); return; }
        try{ await sb.auth.signOut(); }catch(e){}   // جلسة بلا صلاحية أدمن
      }
      render(); return;
    }
  }catch(e){}
  render();
}
function rowToOrder(r){ return { id:'#'+ar(r.order_no), num:r.order_no, dbId:r.id, createdAt:r.created_at?new Date(r.created_at).getTime():Date.now(),
  items:r.items||[], customer:{name:r.customer_name||'',phone:r.customer_phone||''}, address:r.address||{},
  date:r.service_date, startMin:r.start_min, duration:r.duration, endMin:r.end_min, price:Number(r.price)||0, finalPrice:Number(r.final_price)||0,
  free:!!r.free, status:r.status||'new', rating:r.rating||0, reminded:!!r.reminded, quick:!!r.quick, note:r.note||'', videoUrl:r.video_url||'', invoice:r.invoice||null, providerPhone:r.provider_phone||'', feedback:r.feedback||'', rejectReason:r.reject_reason||'', wantsEarlier:!!r.wants_earlier, reviewAnon:!!r.review_anon, reviewHidden:!!r.review_hidden, discountPct:+r.discount_pct||0, promoCode:r.promo_code||'',
  arrived:!!r.arrived, delayMin:+r.delay_min||0 }; }
async function loadAll(){
  if(!cloudReady||!loggedIn){ render(); return; }
  try{ const o=await sb.from('khafet_orders').select('*').order('created_at',{ascending:false}); ORDERS=(o.data||[]).map(rowToOrder); }catch(e){}
  try{ const p=await sb.from('khafet_providers').select('*').order('created_at',{ascending:false}); PROVIDERS=p.data||[]; }catch(e){}
  try{ const pr=await sb.from('khafet_prices').select('*'); PRICES={}; (pr.data||[]).forEach(r=>{ PRICES[r.sid]=Number(r.price); }); }catch(e){}
  try{ const s=await sb.from('khafet_subscriptions').select('*').order('created_at',{ascending:false}); SUBS=s.data||[]; }catch(e){}
  try{ const iv=await sb.from('khafet_inventory').select('*').order('name'); INV=iv.data||[]; }catch(e){}
  try{ const lg=await sb.from('khafet_stock_log').select('*').order('created_at',{ascending:false}).limit(2000); LOG=lg.data||[]; }catch(e){}
  try{ const st=await sb.from('khafet_staff').select('*'); STAFF=st.data||[]; }catch(e){}
  render();
}
/* ===== إدارة حسابات الفنيين (عبر دالة staff-admin الآمنة) ===== */
async function callStaffAdmin(body){
  try{
    const { data:{ session } }=await sb.auth.getSession();
    if(!session) return { error:'انتهت الجلسة — سجّل دخول' };
    const r=await fetch(SUPABASE_URL+'/functions/v1/staff-admin',{ method:'POST',
      headers:{ apikey:SUPABASE_ANON, Authorization:'Bearer '+session.access_token, 'Content-Type':'application/json' },
      body:JSON.stringify(body) });
    return await r.json();
  }catch(e){ return { error:String(e.message||e) }; }
}
function renderTechs(){
  const techs=STAFF.filter(s=>s.role==='tech');
  const rows=techs.length? techs.map(t=>{
    const off=t.active===false;
    return `<div class="rline">
      <div class="rl-t"><b>${esc(t.name||'—')}</b><small>${off?'⛔ موقوف':'✅ فعّال'} · دخول: <code>${esc(t.login||'—')}</code>${t.phone?' · '+esc(t.phone):''}</small></div>
      <button class="sbtn ${off?'ok':'danger'}" onclick="toggleTechActive('${t.user_id}',${off})">${off?'تفعيل':'إيقاف'}</button>
      <button class="sbtn" onclick="resetTechPass('${t.user_id}')">🔑</button>
    </div>`; }).join('') : `<p style="color:var(--muted)">لا يوجد فنيّون بعد — أضف أول فني تحت.</p>`;
  return `${rows}
    <div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px">
      <b style="display:block;margin-bottom:10px">➕ إضافة فني</b>
      <div class="field"><input id="nt_name" placeholder="الاسم (مثال: أحمد علي)" /></div>
      <div class="field"><input id="nt_user" placeholder="اسم الدخول (إنجليزي بلا مسافات، مثال: ahmad)" inputmode="latin" /></div>
      <div class="field"><input id="nt_phone" placeholder="الجوال (اختياري)" inputmode="tel" /></div>
      <div class="field"><input id="nt_pass" placeholder="كلمة المرور (٦ خانات فأكثر)" /></div>
      <button class="sbtn ok" style="width:100%;margin-top:6px" onclick="addTech()">إنشاء حساب الفني</button>
    </div>`;
}
async function addTech(){
  const g=id=>((document.getElementById(id)||{}).value||'').trim();
  const name=g('nt_name'), login=g('nt_user'), phone=g('nt_phone'), password=g('nt_pass');
  if(!name||!login||password.length<6){ toast('عبّي الاسم واسم الدخول وكلمة مرور ٦+'); return; }
  toast('⏳ جارٍ إنشاء الحساب...');
  const d=await callStaffAdmin({ action:'create', login, name, phone, password, role:'tech' });
  if(d&&d.ok){ toast('✅ تم — اسم دخول الفني: '+d.login); await loadStaff(); }
  else toast('⚠️ '+((d&&d.error)||'تعذّر الإنشاء'));
}
async function toggleTechActive(uid, makeActive){
  const d=await callStaffAdmin({ action:'set_active', user_id:uid, active:!!makeActive });
  if(d&&d.ok){ toast(makeActive?'✅ فُعّل الفني':'⛔ أُوقف الفني'); await loadStaff(); }
  else toast('⚠️ '+((d&&d.error)||'تعذّر'));
}
async function resetTechPass(uid){
  const p=prompt('كلمة المرور الجديدة (٦ خانات على الأقل):'); if(p==null) return;
  if(p.trim().length<6){ toast('٦ خانات على الأقل'); return; }
  const d=await callStaffAdmin({ action:'set_password', user_id:uid, password:p.trim() });
  toast(d&&d.ok?'✅ تغيّرت كلمة المرور':'⚠️ '+((d&&d.error)||'تعذّر'));
}
async function loadStaff(){ if(!cloudReady) return; try{ const { data }=await sb.from('khafet_staff').select('*'); STAFF=data||[]; if(loggedIn) render(); }catch(e){} }
async function logStock(it, delta, reason, actor){
  const entry={ item_id:it.id||null, item_name:it.name||'', delta, reason, actor:actor||'المؤسسة' };
  if(cloudReady){ try{ const r=await sb.from('khafet_stock_log').insert(entry).select().single(); if(!r.error&&r.data){ LOG.unshift(r.data); return; } }catch(e){} }
  LOG.unshift(Object.assign({created_at:new Date().toISOString()},entry));
}
/* ---- المخزن ---- */
async function invAddItem(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const name=g('inv_new_name'); if(!name){ toast('اكتب اسم الصنف'); return; }
  const unit=g('inv_new_unit')||'حبة'; const qty=Math.abs(+g('inv_new_qty')||0);
  const data={ name, unit, qty };
  if(cloudReady){ try{ const r=await sb.from('khafet_inventory').insert(data).select().single(); if(!r.error&&r.data){ INV.unshift(r.data); if(qty>0) await logStock(r.data,qty,'شراء','المؤسسة'); } }catch(e){ toast('تعذّر الحفظ'); return; } }
  toast('✅ أُضيف الصنف للمخزن'); render();
}
async function invSave(it){ if(cloudReady&&it.id){ try{ await sb.from('khafet_inventory').update({qty:it.qty}).eq('id',it.id); }catch(e){} } }
function invReadAmt(btn){ const inp=btn.parentElement.querySelector('.inv-amt'); const v=Math.abs(+((inp||{}).value)||0); return {inp,v}; }
async function invAdd(id,btn){ const it=INV.find(x=>x.id===id); if(!it) return; const {inp,v}=invReadAmt(btn); if(!v){ toast('اكتب الكمية'); return; } it.qty=(+it.qty||0)+v; if(inp) inp.value=''; await invSave(it); await logStock(it,v,'شراء','المؤسسة'); toast('➕ أُضيف للمخزن'); render(); }
async function invGive(id,btn){ const it=INV.find(x=>x.id===id); if(!it) return; const {inp,v}=invReadAmt(btn); if(!v){ toast('اكتب الكمية'); return; } it.qty=Math.max(0,(+it.qty||0)-v); if(inp) inp.value=''; await invSave(it); await logStock(it,-v,'صرف','المؤسسة'); toast('➖ صُرف للعميل'); render(); }
async function invDelete(id){ if(!confirm('حذف الصنف من المخزن؟')) return; if(cloudReady){ try{ await sb.from('khafet_inventory').delete().eq('id',id); }catch(e){} } INV=INV.filter(x=>x.id!==id); toast('حُذف'); render(); }
function invStats(itemId){ let inn=0,out=0; LOG.forEach(e=>{ if(e.item_id===itemId){ const d=+e.delta||0; if(d>0) inn+=d; else out+=Math.abs(d); } }); return {inn,out}; }
function renderInventory(){
  const add=`<div class="inv-add-row">
    <input id="inv_new_name" placeholder="اسم الصنف (لمبة LED، ماسورة...)" />
    <input id="inv_new_unit" placeholder="الوحدة" value="حبة" />
    <input id="inv_new_qty" type="number" inputmode="numeric" placeholder="الكمية" />
    <button class="sbtn ok" onclick="invAddItem()">➕ إضافة صنف</button>
  </div>`;
  if(!INV.length) return add+`<p style="color:var(--muted);margin-top:10px">المخزن فارغ — أضف أصنافك.</p>`;
  const rows=INV.map(it=>{
    const low=(+it.qty||0)<=3;
    const s=invStats(it.id); const expected=s.inn-s.out; const mismatch=(expected!==(+it.qty||0));
    return `<div class="inv-item ${low?'low':''} ${mismatch?'mismatch':''}">
    <div class="inv-info"><b>${esc(it.name)}</b><span class="inv-qty">المتوفر: ${ar(+it.qty||0)} ${esc(it.unit||'')}${low?' ⚠️':''}</span></div>
    <div class="inv-recon">اشتُري: <b>${ar(s.inn)}</b> · صُرف: <b>${ar(s.out)}</b> · المفروض: <b>${ar(expected)}</b>${mismatch?` <span class="recon-warn">⚠️ فرق ${ar(Math.abs(expected-(+it.qty||0)))}! راجعي</span>`:' <span class="recon-ok">✅ مطابق</span>'}</div>
    <div class="inv-ctl">
      <input type="number" class="inv-amt" inputmode="numeric" placeholder="كمية" />

function renderStockLog(){
  if(!LOG.length) return `<p style="color:var(--muted)">لا توجد حركات بعد.</p>`;
  // تجميع حسب اليوم
  const groups={};
  LOG.forEach(e=>{ const d=new Date(e.created_at); const key=dateISO(d); (groups[key]=groups[key]||[]).push(e); });
  const days=Object.keys(groups).sort().reverse().slice(0,14);
  return days.map(key=>{
    const items=groups[key];
    const addQ=items.filter(e=>+e.delta>0).reduce((a,e)=>a+ +e.delta,0);
    const subQ=items.filter(e=>+e.delta<0).reduce((a,e)=>a+Math.abs(+e.delta),0);
    const rows=items.map(e=>{ const t=new Date(e.created_at); const pos=+e.delta>0;
      return `<div class="log-row"><span class="log-t">${fmtTime(t.getHours()*60+t.getMinutes())}</span>
        <span class="log-d ${pos?'add':'sub'}">${pos?'➕':'➖'} ${ar(Math.abs(+e.delta))}</span>
        <span class="log-n">${esc(e.item_name||'')}</span>
        <span class="log-a">${esc(e.reason||'')} · ${esc(e.actor||'')}</span></div>`;
    }).join('');
    return `<div class="log-day"><div class="log-day-h">📅 ${dayLabel(key)} <small>(＋${ar(addQ)} · －${ar(subQ)})</small></div>${rows}</div>`;
  }).join('');
}

/* اجمع الطلبات تحت رأس لكل يوم — الأقرب أولاً (اليوم ثم بكرة …)، والفايت بالآخر */
function groupByDay(list, todayISO){
  if(!list.length) return `<div class="empty"><div class="ico">🗂️</div><h3>لا توجد طلبات</h3></div>`;
  const g={}; list.forEach(o=>{ (g[o.date]=g[o.date]||[]).push(o); });
  const dates=Object.keys(g).sort();
  const future=dates.filter(d=>d>=todayISO);          // اليوم وما بعده — تصاعدي
  const past=dates.filter(d=>d<todayISO).reverse();   // الفايت — الأحدث أولاً
  return [...future, ...past].map(d=>{
    const cls = d===todayISO ? 'today' : (d<todayISO ? 'past' : '');
    const cards=g[d].sort((a,b)=>a.startMin-b.startMin).map(renderAdminOrder).join('');
    return `<div class="day-head ${cls}"><span>${headLabel(d, todayISO)}</span><span class="cnt">${ar(g[d].length)} طلب</span></div>${cards}`;
  }).join('');
}
function headLabel(iso, todayISO){
  const tmr=new Date(); tmr.setDate(tmr.getDate()+1);
  if(iso===todayISO) return '📅 اليوم · '+dayLabel(iso);
  if(iso===dateISO(tmr)) return '⏭️ غداً · '+dayLabel(iso);
  return dayLabel(iso);
}

  const pendingProv=PROVIDERS.filter(p=>(p.status||'pending')==='pending').length;
  document.getElementById('app').innerHTML=`<div class="screen">
    <div class="admin-bar"><span class="ico">🏢</span><div style="flex:1"><b>${BRAND}</b><small>لوحة إدارة الطلبات والمزوّدين</small></div></div>
    <div class="stats">
      <div class="stat gold"><div class="n">${ar(todayOrders.length)}</div><div class="l">📅 طلبات اليوم</div></div>
      <div class="stat"><div class="n">${ar(cnt('new'))}</div><div class="l">🆕 بانتظار التأكيد</div></div>
      <div class="stat"><div class="n">${ar(pendingProv)}</div><div class="l">🤝 مزوّدون للمراجعة</div></div>
      <div class="stat green"><div class="n">${money(revenue)}</div><div class="l">💰 إيراد مكتمل</div></div>
    </div>
    ${renderCalendar(todayISO)}
    <div class="sec-head"><h2>📥 الطلبات</h2></div>
    <div class="fbar">${fbar}</div>
    ${orderCards}
    <div style="height:26px"></div>
    ${panel('techs', `🧑‍🔧 الفنيّون (${ar(STAFF.filter(s=>s.role==='tech').length)})`,   ()=>renderTechs())}
    ${panel('rem',   `📩 تذكيرات المواعيد القريبة`,                        ()=>remHtml)}
    ${panel('comm',  `💰 مستحقات المنصة (عمولة ${ar(COMMISSION)} ر.س/طلب)`, ()=>renderCommission())}
    ${panel('prov',  `🤝 مزوّدو الصيانة (${ar(PROVIDERS.length)})`,          ()=>renderProviders())}
    ${panel('subs',  `🛡️ طلبات الاشتراك (${ar(SUBS.filter(s=>s.status!=='active').length)} جديد)`, ()=>renderSubs())}
    ${panel('inv',   `📦 المخزن (${ar(INV.length)} صنف)`,                    ()=>renderInventory())}
    ${panel('log',   `📋 سجل حركة المخزن (يومي)`,                           ()=>renderStockLog())}
    ${panel('prices',`🏷️ أسعار الخدمات`,                                    ()=>renderPriceEditor())}
  </div>`;
}
function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>el.classList.remove('show'),2200); }

render();
if(window.supabase) initCloud(); else window.addEventListener('load', initCloud);
</script>
</body>
</html>
